services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-Sky AutoRent}
        NEXT_PUBLIC_LOGO_PATH: ${NEXT_PUBLIC_LOGO_PATH:-/logo-blue.png}
        NEXT_PUBLIC_MODEL_3D_PATH: ${NEXT_PUBLIC_MODEL_3D_PATH:-/models/maserati.optimized.glb}
        NEXT_PUBLIC_CONTACT_PHONE: ${NEXT_PUBLIC_CONTACT_PHONE}
        NEXT_PUBLIC_CONTACT_PHONE_HREF: ${NEXT_PUBLIC_CONTACT_PHONE_HREF}
        NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL}
        NEXT_PUBLIC_CONTACT_ADDRESS: ${NEXT_PUBLIC_CONTACT_ADDRESS}
        NEXT_PUBLIC_CONTACT_WORKING_HOURS: ${NEXT_PUBLIC_CONTACT_WORKING_HOURS}
        NEXT_PUBLIC_SOCIAL_TELEGRAM: ${NEXT_PUBLIC_SOCIAL_TELEGRAM}
        NEXT_PUBLIC_SOCIAL_INSTAGRAM: ${NEXT_PUBLIC_SOCIAL_INSTAGRAM}
        NEXT_PUBLIC_SOCIAL_WHATSAPP: ${NEXT_PUBLIC_SOCIAL_WHATSAPP}
        NEXT_PUBLIC_SOCIAL_TIKTOK: ${NEXT_PUBLIC_SOCIAL_TIKTOK}
        NEXT_PUBLIC_SOCIAL_TELEGRAM_LABEL: ${NEXT_PUBLIC_SOCIAL_TELEGRAM_LABEL}
        NEXT_PUBLIC_SOCIAL_INSTAGRAM_LABEL: ${NEXT_PUBLIC_SOCIAL_INSTAGRAM_LABEL}
        NEXT_PUBLIC_SOCIAL_WHATSAPP_LABEL: ${NEXT_PUBLIC_SOCIAL_WHATSAPP_LABEL}
        NEXT_PUBLIC_SOCIAL_TIKTOK_LABEL: ${NEXT_PUBLIC_SOCIAL_TIKTOK_LABEL}
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      # 3D модели монтируются с сервера (не в git)
      - ./public/models:/app/public/models:ro
    restart: unless-stopped
